<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Tag</title>
</head>

<body>
    <!--The href in HTML stands for hypertext reference. It is an attribute used with the <a> (anchor) tag to specify the destination URL that the link points-->
    <p><a href="https://www.google.com">Google</a></p>
    <p><a href="https://www.facebook.com">Facebook</a></p>
    <p><a href="https://www.instagram.com">Instagram</a></p>
    <p><a href="https://www.wikipedia.com">Wikipedia</a></p>
    <p><a href="https://www.whatsapp.com">WhatsApp</a></p>

    <!--To open link in new tab -->
    <a target="_blank" href="https://wwww.tiktok.com">TikTok</a>

</body>

</html>
