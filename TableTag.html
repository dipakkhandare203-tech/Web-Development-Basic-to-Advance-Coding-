<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border: 2px solid black;
        }

        td {
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <!--The <table> tag is the fundamental HTML element used to define and structure data in a two-dimensional grid format, comprised of rows and columns. It acts as a container for all other table-related elements-->
    <h3>TABLE TAG :-</h3>
    <table>
        <caption>STUDENT DETAILS</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Course</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Sudarshan</td>
                <td>21</td>
                <td>CSE</td>
                <td>18</td>
            </tr>
            <tr>
                <td>Harshal</td>
                <td>22</td>
                <td>CSE</td>
                <td>19</td>
            </tr>
            <tr>
                <td>Jayesh</td>
                <td>23</td>
                <td>CSE</td>
                <td>20</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>correct</th>
                <th>correct</th>
                <th>correct</th>
                <th>correct</th>

            </tr>
        </tfoot>
    </table>

    <h3>Rowspan :-</h3>
    <table>
        <tr>
            <th>Name</th>
            <th>class</th>
        </tr>
        <tr>
            <td>Dipak</td>
            <td rowspan="2">CSE DSY</td>
        </tr>
        <tr>
            <td>Sudarshan</td>
        </tr>
    </table>

    <h3>Colspan :-</h3>
    <table>
        <tr>
            <th>Name</th>
            <th>class</th>
        </tr>
        <tr>
            <td colspan="2">Dipak khandare</td>

        </tr>
        <tr>
            <td>Sudarshan</td>
            <td>CSE DSY</td>
        </tr>
    </table>

</body>

</html>
